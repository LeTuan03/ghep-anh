<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghep Anh</title>
    <style>
        :root {
            --cyan: #00f0ff;
            --pink: #ff2d78;
            --purple: #a020f0;
            --bg: #06080f;
            --panel: #0d1117;
            --border: rgba(0, 240, 255, 0.25);
            --text: #e8eaf6;
            --sub: #7986a3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0, 240, 255, 0.07) 0%, transparent 70%),
                radial-gradient(ellipse 60% 30% at 90% 90%, rgba(160, 32, 240, 0.06) 0%, transparent 60%);
        }

        header {
            text-align: center;
            padding: 28px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: clamp(1.3rem, 3.5vw, 2rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--cyan), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--sub);
            margin-top: 5px;
            font-size: 0.88rem;
        }

        .wrap {
            max-width: 1050px;
            margin: 0 auto;
            padding: 20px 14px;
        }

        #dz {
            border: 2px dashed rgba(0, 240, 255, 0.3);
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            color: var(--sub);
            margin-bottom: 18px;
            background: rgba(0, 240, 255, 0.02);
            cursor: pointer;
            transition: all 0.2s;
        }

        #dz.over {
            border-color: var(--cyan);
            background: rgba(0, 240, 255, 0.07);
            color: var(--cyan);
        }

        #dz .ico {
            font-size: 2.2rem;
            margin-bottom: 6px;
        }

        #dz b {
            color: var(--cyan);
        }

        .ctrls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .cg label {
            display: block;
            font-size: 0.7rem;
            color: var(--cyan);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .cg input,
        .cg select {
            width: 100%;
            background: #111820;
            border: 1px solid rgba(0, 240, 255, 0.18);
            color: var(--text);
            padding: 7px 9px;
            border-radius: 6px;
            font-size: 0.88rem;
            outline: none;
        }

        .cg input:focus,
        .cg select:focus {
            border-color: var(--cyan);
        }

        input[type=color] {
            height: 36px;
            padding: 2px;
            cursor: pointer;
        }

        .btns {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        button {
            font-weight: 700;
            font-size: 0.85rem;
            border: none;
            border-radius: 8px;
            padding: 9px 18px;
            cursor: pointer;
            transition: all 0.18s;
        }

        .b-up {
            background: linear-gradient(135deg, var(--cyan), #0080ff);
            color: #000;
            box-shadow: 0 0 16px rgba(0, 240, 255, 0.3);
        }

        .b-up:hover {
            transform: translateY(-2px);
        }

        .b-go {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
        }

        .b-go:hover {
            transform: translateY(-2px);
        }

        .b-dl {
            background: linear-gradient(135deg, #1a8c3a, #2eff7e);
            color: #000;
        }

        .b-dl:hover {
            transform: translateY(-2px);
        }

        .b-dl:disabled {
            opacity: 0.35;
            cursor: default;
            transform: none;
        }

        .b-cl {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--sub);
        }

        .b-cl:hover {
            background: rgba(255, 60, 60, 0.13);
            color: #ff6b6b;
        }

        #thumbs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 18px;
            min-height: 10px;
        }

        .th {
            position: relative;
            width: 68px;
            height: 68px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(0, 240, 255, 0.18);
            cursor: grab;
            transition: border-color 0.2s, transform 0.15s;
            user-select: none;
        }

        .th:hover {
            border-color: var(--cyan);
            transform: scale(1.07);
        }

        .th.drag-on {
            opacity: 0.35;
        }

        .th img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
        }

        .th-x {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 17px;
            height: 17px;
            background: rgba(255, 45, 120, 0.88);
            color: #fff;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .th:hover .th-x {
            opacity: 1;
        }

        .th-n {
            position: absolute;
            bottom: 2px;
            left: 3px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.75);
            font-weight: 700;
            text-shadow: 0 1px 3px #000;
        }

        #prev {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 18px;
            text-align: center;
        }

        #prev h3 {
            font-size: 0.7rem;
            color: var(--cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        #cv {
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid rgba(0, 240, 255, 0.12);
            display: none;
        }

        #ph {
            color: var(--sub);
            font-size: 0.84rem;
            padding: 24px;
        }

        #cnt {
            color: var(--sub);
            font-size: 0.8rem;
            margin-left: 6px;
        }
    </style>
</head>

<body>
    <header>
        <h1>Ghep Anh</h1>
        <p>Keo tha nhieu anh, xep luoi, tai ve 1 file PNG</p>
    </header>
    <div class="wrap">
        <div id="dz">
            <div class="ico">🖼️</div>
            <p>Keo &amp; tha anh vao day, hoac <b id="dz2">nhan de chon anh</b></p>
            <p style="margin-top:5px;font-size:0.77rem">Ho tro PNG, JPG, WEBP — chon nhieu anh cung luc</p>
        </div>
        <input type="file" id="fi" multiple accept="image/*" style="display:none">
        <div class="ctrls">
            <div class="cg"><label>So cot</label><input type="number" id="cols" value="4" min="1" max="20"></div>
            <div class="cg"><label>Kich thuoc o (px)</label><input type="number" id="csz" value="160" min="40"
                    max="600"></div>
            <div class="cg"><label>Khoang cach (px)</label><input type="number" id="gap" value="6" min="0" max="80">
            </div>
            <div class="cg"><label>Bo goc (px)</label><input type="number" id="rad" value="8" min="0" max="80"></div>
            <div class="cg"><label>Mau nen</label><input type="color" id="bgc" value="#06080f"></div>
            <div class="cg"><label>Hien thi anh</label>
                <select id="fit">
                    <option value="cover">Cover (cat vua o)</option>
                    <option value="contain">Contain (hien toan bo)</option>
                    <option value="stretch">Stretch (keo gian)</option>
                </select>
            </div>
            <div class="cg"><label>Padding vien (px)</label><input type="number" id="pad" value="10" min="0" max="100">
            </div>
        </div>
        <div class="btns">
            <button class="b-up" id="bup">+ Them anh <span id="cnt"></span></button>
            <button class="b-go" id="bgo">Ghep anh</button>
            <button class="b-dl" id="bdl" disabled>Tai ve</button>
            <button class="b-cl" id="bcl">Xoa tat ca</button>
        </div>
        <div id="thumbs"></div>
        <div id="prev">
            <h3>Xem truoc ket qua</h3>
            <p id="ph">Them anh va nhan "Ghep anh" de xem ket qua</p>
            <canvas id="cv"></canvas>
        </div>
    </div>
    <script type="text/javascript">
        var fi = document.getElementById('fi');
        var dz = document.getElementById('dz');
        var thumbsEl = document.getElementById('thumbs');
        var cv = document.getElementById('cv');
        var ctx2d = cv.getContext('2d');
        var dlBtn = document.getElementById('bdl');
        var cntEl = document.getElementById('cnt');
        var ph = document.getElementById('ph');

        var images = [];
        var dragIdx = null;

        document.getElementById('bup').addEventListener('click', function () { fi.click(); });
        document.getElementById('dz2').addEventListener('click', function (e) { e.stopPropagation(); fi.click(); });
        document.getElementById('bgo').addEventListener('click', doRender);
        document.getElementById('bdl').addEventListener('click', doDownload);
        document.getElementById('bcl').addEventListener('click', doClear);

        fi.addEventListener('change', function (e) { loadFiles(e.target.files); fi.value = ''; });

        dz.addEventListener('dragover', function (e) { e.preventDefault(); dz.classList.add('over'); });
        dz.addEventListener('dragleave', function () { dz.classList.remove('over'); });
        dz.addEventListener('drop', function (e) {
            e.preventDefault();
            dz.classList.remove('over');
            loadFiles(e.dataTransfer.files);
        });

        function loadFiles(files) {
            var arr = Array.prototype.slice.call(files);
            arr.forEach(function (f) {
                if (!f.type.startsWith('image/')) return;
                var reader = new FileReader();
                reader.onload = function (ev) {
                    var src = ev.target.result;
                    var img = new Image();
                    img.onload = function () {
                        images.push({ src: src, img: img });
                        renderThumbs();
                        updateCount();
                    };
                    img.src = src;
                };
                reader.readAsDataURL(f);
            });
        }

        function updateCount() {
            cntEl.textContent = images.length ? '(' + images.length + ')' : '';
        }

        function renderThumbs() {
            thumbsEl.innerHTML = '';
            images.forEach(function (item, i) {
                var wrap = document.createElement('div');
                wrap.className = 'th';
                wrap.draggable = true;

                var im = document.createElement('img');
                im.src = item.src;
                wrap.appendChild(im);

                var num = document.createElement('span');
                num.className = 'th-n';
                num.textContent = String(i + 1);
                wrap.appendChild(num);

                var del = document.createElement('div');
                del.className = 'th-x';
                del.textContent = 'x';
                wrap.appendChild(del);

                (function (idx) {
                    del.addEventListener('click', function (e) {
                        e.stopPropagation();
                        images.splice(idx, 1);
                        renderThumbs();
                        updateCount();
                    });
                    wrap.addEventListener('dragstart', function () {
                        dragIdx = idx;
                        wrap.classList.add('drag-on');
                    });
                    wrap.addEventListener('dragend', function () {
                        wrap.classList.remove('drag-on');
                    });
                    wrap.addEventListener('dragover', function (e) { e.preventDefault(); });
                    wrap.addEventListener('drop', function (e) {
                        e.preventDefault();
                        if (dragIdx === null || dragIdx === idx) return;
                        var moved = images.splice(dragIdx, 1)[0];
                        images.splice(idx, 0, moved);
                        dragIdx = null;
                        renderThumbs();
                    });
                })(i);

                thumbsEl.appendChild(wrap);
            });
        }

        function doClear() {
            images = [];
            renderThumbs();
            updateCount();
            cv.style.display = 'none';
            ph.style.display = '';
            dlBtn.disabled = true;
        }

        function doRender() {
            if (images.length === 0) { alert('Vui long them it nhat 1 anh!'); return; }

            var cols = Math.max(1, parseInt(document.getElementById('cols').value) || 4);
            var csz = Math.max(40, parseInt(document.getElementById('csz').value) || 160);
            var gap = Math.max(0, parseInt(document.getElementById('gap').value) || 6);
            var rad = Math.max(0, parseInt(document.getElementById('rad').value) || 8);
            var bg = document.getElementById('bgc').value;
            var fit = document.getElementById('fit').value;
            var pad = Math.max(0, parseInt(document.getElementById('pad').value) || 10);

            var rows = Math.ceil(images.length / cols);
            var W = pad * 2 + cols * csz + (cols - 1) * gap;
            var H = pad * 2 + rows * csz + (rows - 1) * gap;

            cv.width = W;
            cv.height = H;

            ctx2d.fillStyle = bg;
            ctx2d.fillRect(0, 0, W, H);

            images.forEach(function (item, idx) {
                var col = idx % cols;
                var row = Math.floor(idx / cols);
                var x = pad + col * (csz + gap);
                var y = pad + row * (csz + gap);

                ctx2d.save();
                rrClip(x, y, csz, csz, rad);

                var img = item.img;
                var iw = img.naturalWidth;
                var ih = img.naturalHeight;
                var sc, dw, dh;

                if (fit === 'stretch') {
                    ctx2d.drawImage(img, x, y, csz, csz);
                } else if (fit === 'contain') {
                    sc = Math.min(csz / iw, csz / ih);
                    dw = iw * sc; dh = ih * sc;
                    ctx2d.drawImage(img, x + (csz - dw) / 2, y + (csz - dh) / 2, dw, dh);
                } else {
                    sc = Math.max(csz / iw, csz / ih);
                    dw = iw * sc; dh = ih * sc;
                    ctx2d.drawImage(img, x + (csz - dw) / 2, y + (csz - dh) / 2, dw, dh);
                }

                ctx2d.restore();
            });

            cv.style.display = 'block';
            ph.style.display = 'none';
            dlBtn.disabled = false;
        }

        function rrClip(x, y, w, h, r) {
            ctx2d.beginPath();
            ctx2d.moveTo(x + r, y);
            ctx2d.lineTo(x + w - r, y);
            ctx2d.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx2d.lineTo(x + w, y + h - r);
            ctx2d.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx2d.lineTo(x + r, y + h);
            ctx2d.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx2d.lineTo(x, y + r);
            ctx2d.quadraticCurveTo(x, y, x + r, y);
            ctx2d.closePath();
            ctx2d.clip();
        }

        function doDownload() {
            var a = document.createElement('a');
            a.download = 'ghep-anh.png';
            a.href = cv.toDataURL('image/png');
            a.click();
        }
    </script>
</body>

</html>
